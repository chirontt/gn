name: ci-build

on:
  pull_request:
    branches:
      - master
      - develop
      - feature/**
  push:
    branches:
      - master
      - develop
      - feature/**
    tags:
      - '*'
  workflow_dispatch:
  release:
    types: published

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  NINJA_BASE_URL: https://github.com/ninja-build/ninja/releases/download/

jobs:
  posix:
    strategy:
      fail-fast: true
      matrix:
        include:
          - slug: linux-i386
            cc: gcc
            cxx: g++
            cflags: "-m32"
            ldflags: "-m32"
            libflags: "-m32"
            os: ubuntu-22.04
            install: "g++-multilib"
            ninja_release_name: v1.12.1/ninja-linux.zip

          - slug: linux-amd64
            cc: gcc
            cxx: g++
            cflags: "-m64"
            ldflags: "-m64"
            libflags: "-m64"
            os: ubuntu-22.04
            ninja_release_name: v1.12.1/ninja-linux.zip

          - slug: macos-amd64
            gen_args: "--use-lto --use-icf"
            cc: clang
            cxx: clang++
            cflags: "-m64"
            ldflags: "-m64"
            libflags: "-m64"
            os: macos-15-intel
            ninja_release_name: v1.12.1/ninja-mac.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Install packages
        if: matrix.install
        run: sudo apt update && sudo apt install ${{ matrix.install }}

      - uses: actions/checkout@v6
        with:
          # we need all everything for `git describe` to work correctly
          fetch-depth: 0

      - name: Make dependencies directory
        run: |
          DEPS_DIR=$(cd ~; pwd)/deps
          mkdir -p ${DEPS_DIR}
          echo "export DEPS_DIR=$DEPS_DIR" >> "${GITHUB_WORKSPACE}/.env"

      - name: Install recent Ninja
        run: |
          source .env
          cd ${DEPS_DIR}
          wget --no-check-certificate --quiet -O ninja.zip "${NINJA_BASE_URL}${{ matrix.ninja_release_name }}"
          python -c 'import sys,zipfile;zipfile.ZipFile(sys.argv[1]).extractall()' ninja.zip
          chmod +x ninja

      - name: Setup compiler environment
        run: |
          echo 'export CC="${{ matrix.cc }}"' >> "${GITHUB_WORKSPACE}/.env"
          echo 'export CXX="${{ matrix.cxx }}"' >> "${GITHUB_WORKSPACE}/.env"
          echo 'export CFLAGS="${{ matrix.cflags }}"' >> "${GITHUB_WORKSPACE}/.env"
          echo 'export LDFLAGS="${{ matrix.ldflags }}"' >> "${GITHUB_WORKSPACE}/.env"
          echo 'export LIBFLAGS="${{ matrix.libflags }}"' >> "${GITHUB_WORKSPACE}/.env"

      - name: Cache libc++ and libc++abi if needed
        if: "${{ matrix.cc == 'clang' }}"
        uses: actions/cache@v5
        with:
          path: ~/deps/llvm
          key: ${{ runner.os }}-llvm-${{ matrix.slug }}

      - name: Show final environment
        run: |
          cat .env

      - name: Compile
        run: |
          source .env
          build/gen.py ${{ matrix.gen_args }}
          ${DEPS_DIR}/ninja -C out

      - name: Run tests
        run: |
          source .env
          out/gn_unittests

      - name: Archive binaries
        run: |
          tar -C out -czf "out/gn-${{ matrix.slug }}.tar.gz" gn

      - name: Upload bin
        uses: actions/upload-artifact@v7
        with:
          name: gn-${{ matrix.slug }}
          path: out/gn

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            out/gn-${{ matrix.slug }}.tar.gz

  windows:
    strategy:
      fail-fast: true
      matrix:
        include:
          - slug: windows-i386
            os: windows-2022
            arch: x86
            gen_args: "--use-lto"

          - slug: windows-amd64
            os: windows-2022
            arch: x64
            gen_args: "--use-lto"

          - slug: windows-arm64
            os: windows-11-arm
            arch: arm64
            gen_args: "--use-lto"

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh

    steps:
      - uses: actions/checkout@v6
        with:
          # we need all everything for `git describe` to work correctly
          fetch-depth: 0

      - name: Check Ninja version
        run: |
          ninja --version

      - name: Set up Visual Studio shell
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build
        run: |
          python build/gen.py ${{ matrix.gen_args }}
          ninja -C out

      - name: Run tests
        run: |
          out/gn_unittests

      - name: Make zip
        run: |
          7z a -tzip out\gn-${{ matrix.slug }}.zip out\gn.exe

      - name: Upload bin
        uses: actions/upload-artifact@v7
        with:
          name: gn-${{ matrix.slug }}
          path: out/gn.exe

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            out/gn-${{ matrix.slug }}.zip
